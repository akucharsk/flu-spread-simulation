name: Tests & Code Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11" ]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run basic simulation test
      run: |
        python main_simulation.py --steps 5
        echo "✓ Simulation runs successfully"

    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=. --cov-report=term-missing

    - name: Verify imports and syntax
      run: |
        python -m py_compile agent_types.py
        python -m py_compile agents.py
        python -m py_compile model.py
        python -m py_compile states.py
        python -m py_compile main_simulation.py
        python -m py_compile main_visualization.py
        echo "✓ All modules compile successfully"
